name: Docker Image Check

on:
  push:
    branches: ["develop","main"]
  workflow_dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Chekout
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=agabriellecoelho_devops-satc
            -Dsonar.organization=agabriellecoelho
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build
        run: docker build -t agabriellecoelho/devops-satc:0.0.1 .

      - name: push
        run: docker push docker.io/agabriellecoelho/devops-satc:0.0.1