name: Docker Image Check

on:
  push:
    branches: ["develop"]
workflow-dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Chekout
        uses: actions/chekout@v4



      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets:DOCKER_USERNAME }}
          password: ${{ secrets:DOCKER_PASSWORD }}